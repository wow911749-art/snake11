name: Build Snake.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pygame pyinstaller
      - run: pyinstaller --onefile --noconsole --name Snake snake.py
      - uses: actions/upload-artifact@v4
        with:
          name: Snake-Windows
          path: dist/Snake.exe
